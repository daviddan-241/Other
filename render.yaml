services:
  - type: web
    name: hacxgpt
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node ./dist/index.cjs
    healthCheckPath: /api/auth/user
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: hacxgpt-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: OPENROUTER_API_KEY
        sync: false
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false

databases:
  - name: hacxgpt-db
    databaseName: hacxgpt
    user: hacxgpt
    plan: free
