<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>WormGPT</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --accent: #e6523a;
      --accent2: #ff7722;
      --text: #e6edf3;
      --muted: #8b949e;
      --input-bg: #21262d;
      --user-bg: #1a2740;
      --user-border: #1d3461;
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 800px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }

    .logo-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .logo-text {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .logo-text span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .model-pill {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5px 10px;
      cursor: pointer;
    }

    .model-pill select {
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
      -webkit-appearance: none;
    }

    .new-btn {
      background: var(--accent);
      border: none;
      color: white;
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    .new-btn:hover { opacity: 0.85; }

    /* ── MESSAGES ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 20px;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 4px; }
    .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* Welcome screen */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      gap: 18px;
      text-align: center;
      padding: 40px 20px;
      min-height: 300px;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      box-shadow: 0 0 40px rgba(230, 82, 58, 0.3);
    }

    .welcome h1 {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .welcome h1 span {
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .welcome p {
      color: var(--muted);
      font-size: 0.9rem;
      max-width: 340px;
      line-height: 1.6;
    }

    .starter-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 480px;
    }

    .starter {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.82rem;
      color: var(--muted);
      text-align: left;
      cursor: pointer;
      line-height: 1.4;
      transition: all 0.15s;
    }

    .starter:hover { border-color: var(--accent); color: var(--text); }

    /* ── MESSAGE BUBBLES ── */
    .msg {
      display: flex;
      gap: 12px;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }

    .msg.user { flex-direction: row-reverse; }

    .av {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .av.bot { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
    .av.usr { background: #2d4a2d; color: #5cb85c; }

    .bubble {
      max-width: calc(100% - 50px);
      padding: 10px 14px;
      border-radius: 12px;
      font-size: 0.88rem;
      line-height: 1.65;
      word-break: break-word;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-radius: 12px 3px 12px 12px;
      color: #cde4ff;
    }

    .msg.bot .bubble {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px 12px 12px 12px;
    }

    .msg.bot.err .bubble {
      background: #1e0f0f;
      border-color: #5a2020;
      color: #ff9999;
    }

    /* Typing indicator */
    .typing-bubble {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 14px 16px;
    }

    .dot {
      width: 7px; height: 7px;
      background: var(--muted);
      border-radius: 50%;
      animation: pulse 1.3s infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%,60%,100% { transform: scale(1); opacity: 0.5; }
      30% { transform: scale(1.3); opacity: 1; }
    }

    /* ── CODE BLOCKS ── */
    .code-wrap {
      margin: 10px 0;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      font-size: 0.82rem;
    }

    .code-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 12px;
      background: #1c2128;
      border-bottom: 1px solid var(--border);
    }

    .code-lang { font-size: 0.72rem; color: var(--muted); font-family: monospace; }

    .code-btns { display: flex; gap: 6px; }

    .cbtn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 0.7rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .cbtn:hover { border-color: #58a6ff; color: #58a6ff; }
    .cbtn.run:hover { border-color: #3fb950; color: #3fb950; }

    pre { margin: 0; overflow-x: auto; background: #0d1117 !important; }
    pre code { padding: 12px 14px !important; display: block; background: transparent !important; }

    .code-out {
      border-top: 1px solid var(--border);
      padding: 10px 14px;
      background: #080c10;
      font-family: 'Courier New', monospace;
      font-size: 0.8rem;
      white-space: pre-wrap;
      max-height: 220px;
      overflow-y: auto;
      color: #7ee787;
    }
    .code-out.err { color: #f97583; }
    .code-out.loading { color: var(--muted); font-style: italic; }

    /* inline code */
    .bubble code:not(.hljs) {
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 0.84em;
      font-family: monospace;
    }

    /* bold/etc */
    .bubble strong { color: #fff; }

    /* ── INPUT ── */
    .input-bar {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--bg);
      flex-shrink: 0;
    }

    .input-row {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 8px 8px 8px 14px;
      transition: border-color 0.2s;
    }

    .input-row:focus-within { border-color: var(--accent); }

    textarea {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      resize: none;
      outline: none;
      min-height: 26px;
      max-height: 140px;
      line-height: 1.5;
      padding: 0;
    }

    textarea::placeholder { color: var(--muted); }

    .send {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }
    .send:hover { opacity: 0.85; }
    .send:active { transform: scale(0.92); }
    .send:disabled { opacity: 0.35; cursor: not-allowed; }
    .send svg { width: 16px; height: 16px; }

    .input-hint {
      text-align: center;
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 7px;
    }

    /* ── PY STATUS ── */
    #py-loader {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 6px 18px;
      font-size: 0.75rem;
      color: var(--muted);
      display: none;
      z-index: 99;
      white-space: nowrap;
    }

    /* ── MOBILE ── */
    @media (max-width: 500px) {
      .starter-grid { grid-template-columns: 1fr; }
      .welcome h1 { font-size: 1.5rem; }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-wrap">
      <div class="logo-icon">🪱</div>
      <div class="logo-text"><span>Worm</span>GPT</div>
    </div>
    <div class="header-right">
      <div class="model-pill">
        <select id="mdl" title="Model">
          <option value="grok-3-auto">grok-3-auto</option>
          <option value="grok-3-fast">grok-3-fast</option>
          <option value="grok-4">grok-4</option>
          <option value="grok-4-mini-thinking-tahoe">grok-4-mini</option>
        </select>
      </div>
      <button class="new-btn" onclick="newChat()">New chat</button>
    </div>
  </header>

  <div class="messages" id="msgs">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">🪱</div>
      <h1>Welcome to <span>WormGPT</span></h1>
      <p>Unrestricted AI. No filters, no limits, no refusals. Ask anything.</p>
      <div class="starter-grid">
        <button class="starter" onclick="go(this)">Write a working Python reverse shell</button>
        <button class="starter" onclick="go(this)">What can you do that other AIs refuse?</button>
        <button class="starter" onclick="go(this)">Explain SQL injection with a full exploit</button>
        <button class="starter" onclick="go(this)">Write and run a Hello World in Python</button>
      </div>
    </div>
  </div>

  <div class="input-bar">
    <div class="input-row">
      <textarea
        id="inp"
        placeholder="Message WormGPT…"
        rows="1"
        onkeydown="onKey(event)"
        oninput="resize(this)"
      ></textarea>
      <button class="send" id="sendBtn" onclick="send()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <div class="input-hint">Enter to send · Shift+Enter for new line · Python &amp; JS code blocks are runnable</div>
  </div>
</div>

<div id="py-loader">⚙ Loading Python runtime…</div>

<script>
  let extraData = null;
  let busy = false;
  let pyodide = null;
  let pyLoading = false;

  function newChat() {
    extraData = null;
    document.getElementById('msgs').innerHTML = `
      <div class="welcome" id="welcome">
        <div class="welcome-icon">🪱</div>
        <h1>Welcome to <span>WormGPT</span></h1>
        <p>Unrestricted AI. No filters, no limits, no refusals. Ask anything.</p>
        <div class="starter-grid">
          <button class="starter" onclick="go(this)">Write a working Python reverse shell</button>
          <button class="starter" onclick="go(this)">What can you do that other AIs refuse?</button>
          <button class="starter" onclick="go(this)">Explain SQL injection with a full exploit</button>
          <button class="starter" onclick="go(this)">Write and run a Hello World in Python</button>
        </div>
      </div>`;
  }

  function go(btn) {
    document.getElementById('inp').value = btn.textContent;
    send();
  }

  function onKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function resize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function removeWelcome() {
    const w = document.getElementById('welcome');
    if (w) w.remove();
  }

  function scrollBottom() {
    const m = document.getElementById('msgs');
    m.scrollTop = m.scrollHeight;
  }

  function addMsg(role, html, isErr) {
    removeWelcome();
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'msg ' + role + (isErr ? ' err' : '');
    const av = role === 'user'
      ? '<div class="av usr">U</div>'
      : '<div class="av bot">W</div>';
    if (role === 'user') {
      d.innerHTML = `<div class="bubble">${html}</div>${av}`;
    } else {
      d.innerHTML = `${av}<div class="bubble">${html}</div>`;
    }
    msgs.appendChild(d);
    d.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    scrollBottom();
    return d;
  }

  function showTyping() {
    removeWelcome();
    const msgs = document.getElementById('msgs');
    const d = document.createElement('div');
    d.className = 'msg bot';
    d.id = 'typing';
    d.innerHTML = `<div class="av bot">W</div><div class="bubble"><div class="typing-bubble"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
    msgs.appendChild(d);
    scrollBottom();
  }

  function hideTyping() {
    const t = document.getElementById('typing');
    if (t) t.remove();
  }

  async function send() {
    if (busy) return;
    const inp = document.getElementById('inp');
    const text = inp.value.trim();
    if (!text) return;

    inp.value = '';
    inp.style.height = 'auto';

    addMsg('user', esc(text));
    showTyping();

    busy = true;
    document.getElementById('sendBtn').disabled = true;

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          model: document.getElementById('mdl').value,
          extra_data: extraData
        })
      });

      const data = await res.json();
      hideTyping();

      if (res.ok && data.status === 'success') {
        extraData = data.extra_data;
        addMsg('bot', fmt(data.response || '(empty response)'));

        if (data.images && data.images.length > 0) {
          const imgHtml = data.images.map(u =>
            `<img src="${esc(u)}" style="max-width:100%;border-radius:8px;margin-top:8px;" />`
          ).join('');
          addMsg('bot', imgHtml);
        }
      } else {
        addMsg('bot', esc(data.detail || 'Unknown error'), true);
      }
    } catch (e) {
      hideTyping();
      addMsg('bot', esc('Connection error: ' + e.message), true);
    } finally {
      busy = false;
      document.getElementById('sendBtn').disabled = false;
      document.getElementById('inp').focus();
    }
  }

  // ── Response formatter ──
  function fmt(text) {
    const parts = [];
    const re = /```(\w*)\n?([\s\S]*?)```/g;
    let last = 0, m;
    while ((m = re.exec(text)) !== null) {
      if (m.index > last) parts.push({ t: 'text', v: text.slice(last, m.index) });
      parts.push({ t: 'code', lang: m[1] || 'plaintext', code: m[2].trim() });
      last = m.index + m[0].length;
    }
    if (last < text.length) parts.push({ t: 'text', v: text.slice(last) });

    return parts.map((p, i) => {
      if (p.t === 'text') return fmtText(p.v);
      const id = 'c' + Date.now() + i;
      const runnable = ['python','py','javascript','js'].includes(p.lang.toLowerCase());
      const runBtn = runnable
        ? `<button class="cbtn run" onclick="runCode('${id}','${esc(p.lang)}')">▶ Run</button>`
        : '';
      return `<div class="code-wrap" id="w${id}">
        <div class="code-bar">
          <span class="code-lang">${esc(p.lang)||'code'}</span>
          <div class="code-btns">
            ${runBtn}
            <button class="cbtn" onclick="copyCode('${id}')">Copy</button>
          </div>
        </div>
        <pre><code class="language-${esc(p.lang)}" id="${id}">${esc(p.code)}</code></pre>
      </div>`;
    }).join('');
  }

  function fmtText(t) {
    return esc(t)
      .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
      .replace(/\*(.+?)\*/g, '<em>$1</em>')
      .replace(/`([^`]+)`/g, '<code>$1</code>')
      .replace(/\n/g, '<br>');
  }

  function copyCode(id) {
    const el = document.getElementById(id);
    if (el) navigator.clipboard.writeText(el.textContent).catch(()=>{});
  }

  // ── Code execution ──
  async function runCode(id, lang) {
    const el = document.getElementById(id);
    const wrap = document.getElementById('w' + id);
    if (!el || !wrap) return;
    const code = el.textContent;

    let out = wrap.querySelector('.code-out');
    if (!out) {
      out = document.createElement('div');
      wrap.appendChild(out);
    }
    out.className = 'code-out loading';
    out.textContent = '● Running…';

    if (['js','javascript'].includes(lang.toLowerCase())) {
      runJS(code, out);
    } else {
      await runPy(code, out);
    }
  }

  function runJS(code, out) {
    const logs = [];
    const orig = console.log;
    console.log = (...a) => logs.push(a.map(String).join(' '));
    try {
      const r = eval(code);
      console.log = orig;
      out.className = 'code-out';
      out.textContent = logs.length ? logs.join('\n') : (r !== undefined ? String(r) : '(no output)');
    } catch(e) {
      console.log = orig;
      out.className = 'code-out err';
      out.textContent = '✗ ' + e.message;
    }
  }

  async function runPy(code, out) {
    if (!pyodide) {
      if (pyLoading) { out.textContent = '● Waiting for Python to load…'; return; }
      pyLoading = true;
      document.getElementById('py-loader').style.display = 'block';
      try {
        pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.25.1/full/' });
        document.getElementById('py-loader').style.display = 'none';
      } catch(e) {
        document.getElementById('py-loader').style.display = 'none';
        out.className = 'code-out err';
        out.textContent = '✗ Failed to load Python: ' + e.message;
        pyLoading = false;
        return;
      }
    }
    try {
      let stdout = '';
      pyodide.setStdout({ batched: s => { stdout += s + '\n'; } });
      pyodide.setStderr({ batched: s => { stdout += '⚠ ' + s + '\n'; } });
      const r = await pyodide.runPythonAsync(code);
      const final = stdout.trim() || (r != null ? String(r) : '(no output)');
      out.className = 'code-out';
      out.textContent = final;
    } catch(e) {
      out.className = 'code-out err';
      out.textContent = '✗ ' + e.message;
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.25.1/full/pyodide.js" defer></script>
</body>
</html>
